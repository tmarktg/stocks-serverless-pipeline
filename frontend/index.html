<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRE Stocks — Daily Top Mover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Daily Top Mover</h1>
      <p class="subtitle">AAPL &middot; MSFT &middot; GOOGL &middot; AMZN &middot; TSLA &middot; NVDA</p>
    </header>

    <main>
      <div id="status" class="status">Loading market data&hellip;</div>

      <table id="movers-table" class="hidden" aria-label="Top movers history">
        <thead>
          <tr>
            <th>Date</th>
            <th>Top Mover</th>
            <th>% Change</th>
            <th>Close Price</th>
          </tr>
        </thead>
        <tbody id="movers-body"></tbody>
      </table>

      <p id="updated" class="updated hidden"></p>
    </main>
  </div>

  <!-- config.js is generated by Terraform and injects window.API_URL -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
